title: User authentication behavior
scenarios:
  - name: Successful login with valid credentials
    given: A registered user with valid credentials
    when: The user submits their username and password
    then: The system authenticates the user and returns a session token
  - name: Rejected login with invalid password
    given: A registered user with valid username
    when: The user submits an incorrect password
    then: The system rejects the login and returns an authentication error
metadata:
  produced_by: specify-behavior
  date: "2026-03-05"
