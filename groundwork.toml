# Groundwork Methodology Manifest
#
# This is the single file runa reads to understand the groundwork methodology.
# It declares all artifact types and protocols with their interface edges.
# Topology emerges from the graph of requires/produces relationships.

name = "groundwork"

# --- Artifact Types ---
#
# Each artifact type is a named category of work product with a JSON Schema contract.
# runa validates instances against these schemas.

[[artifact_types]]
name = "behavior-contract"
schema = "schemas/behavior-contract.schema.json"

[[artifact_types]]
name = "implementation-plan"
schema = "schemas/implementation-plan.schema.json"

[[artifact_types]]
name = "research-record"
schema = "schemas/research-record.schema.json"

[[artifact_types]]
name = "assessment"
schema = "schemas/assessment.schema.json"

[[artifact_types]]
name = "documentation-record"
schema = "schemas/documentation-record.schema.json"

[[artifact_types]]
name = "test-evidence"
schema = "schemas/test-evidence.schema.json"

[[artifact_types]]
name = "completion-evidence"
schema = "schemas/completion-evidence.schema.json"

[[artifact_types]]
name = "completion-record"
schema = "schemas/completion-record.schema.json"

# --- Protocols ---
#
# Edge declarations:
#   requires    — artifact must exist and validate before protocol executes (hard dep)
#   accepts     — artifact may be consumed if available (soft dep)
#   produces    — artifact will exist and validate after protocol executes
#   may_produce — artifact might be produced; validated if present
#   trigger     — condition that activates the protocol
#
# Trigger primitives: on_artifact, on_change, on_signal, on_invalid
# Composable with: all_of, any_of

[[protocols]]
name = "plan"
requires = ["behavior-contract"]
accepts = ["research-record"]
produces = ["implementation-plan"]
may_produce = []
trigger = { type = "on_artifact", name = "behavior-contract" }

[[protocols]]
name = "survey"
requires = []
accepts = ["research-record"]
produces = ["assessment"]
may_produce = []
trigger = { type = "on_signal", name = "survey" }

[[protocols]]
name = "decompose"
requires = []
accepts = ["assessment", "behavior-contract", "implementation-plan"]
produces = []
may_produce = []
trigger = { type = "any_of", conditions = [{ type = "on_artifact", name = "assessment" }, { type = "on_signal", name = "decompose-work" }] }

[[protocols]]
name = "begin"
requires = []
accepts = []
produces = []
may_produce = []
trigger = { type = "on_signal", name = "session-start" }

[[protocols]]
name = "specify"
requires = []
accepts = ["research-record"]
produces = ["behavior-contract"]
may_produce = []
trigger = { type = "on_signal", name = "define-behavior" }

[[protocols]]
name = "test"
requires = ["behavior-contract"]
accepts = ["implementation-plan"]
produces = ["test-evidence"]
may_produce = []
trigger = { type = "all_of", conditions = [{ type = "on_artifact", name = "behavior-contract" }, { type = "on_signal", name = "implement" }] }

[[protocols]]
name = "document"
requires = []
accepts = ["behavior-contract", "implementation-plan"]
produces = ["documentation-record"]
may_produce = []
trigger = { type = "on_signal", name = "documentation-review" }

[[protocols]]
name = "verify"
requires = ["test-evidence"]
accepts = ["behavior-contract"]
produces = ["completion-evidence"]
may_produce = []
trigger = { type = "on_artifact", name = "test-evidence" }

[[protocols]]
name = "propose"
requires = ["completion-evidence"]
accepts = []
produces = []
may_produce = []
trigger = { type = "on_artifact", name = "completion-evidence" }

[[protocols]]
name = "land"
requires = ["completion-evidence"]
accepts = ["behavior-contract"]
produces = ["completion-record"]
may_produce = []
trigger = { type = "on_signal", name = "merge-ready" }
